# 跨平台发布流水线（遵循 skill-github-release）
# 触发：推送 v* 标签 / 发布 Release / 手动指定 tag
# 产物：Windows .exe、macOS arm64/x64、Linux x64

name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的现有 tag，例如 v0.2.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.release_ref.outputs.checkout_ref }}
      release_tag: ${{ steps.release_ref.outputs.release_tag }}
    steps:
      - name: Resolve Release Tag
        id: release_ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "checkout_ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "release" ]; then
            echo "checkout_ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "checkout_ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          # 固定 runner 镜像；mac Intel 不再用 macos-13（排队极慢/容量不足），改在 macos-15 交叉出 x86_64
          - os: windows-2022
            asset_name: S2A-Manager-windows-x64.exe
            built_name: S2A-Manager.exe
            target_arch: ""
          - os: macos-15
            asset_name: S2A-Manager-macos-arm64
            built_name: S2A-Manager
            target_arch: arm64
          - os: macos-15
            asset_name: S2A-Manager-macos-x64
            built_name: S2A-Manager
            target_arch: x86_64
          - os: ubuntu-24.04
            asset_name: S2A-Manager-linux-x64
            built_name: S2A-Manager
            target_arch: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.checkout_ref }}

      - name: Verify Tag Matches VERSION
        shell: bash
        run: |
          tag="${{ needs.resolve.outputs.release_tag }}"
          version="$(tr -d '[:space:]' < VERSION)"
          if [ "$tag" != "$version" ]; then
            echo "Tag '$tag' does not match VERSION '$version'."
            exit 1
          fi

      - name: Install Linux Tk dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-tk \
            python3-dev \
            tcl \
            tk \
            libtcl8.6 \
            libtk8.6 \
            binutils

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Create venv and install build deps
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ runner.os }}" = "Linux" ]; then
            # 优先系统 Python（带 tkinter），避免托管解释器缺 _tkinter
            uv venv --python python3 .venv
          else
            uv venv --python 3.12 .venv
          fi
          export UV_PROJECT_ENVIRONMENT="${PWD}/.venv"
          uv sync --group dev --frozen
          uv run python -c "import sys; print(sys.version); import tkinter; print('tkinter', tkinter.TkVersion)"

      - name: Build with PyInstaller
        shell: bash
        env:
          PYINSTALLER_TARGET_ARCH: ${{ matrix.target_arch }}
        run: |
          set -euo pipefail
          if [ -n "${PYINSTALLER_TARGET_ARCH}" ]; then
            echo "Building with PYINSTALLER_TARGET_ARCH=${PYINSTALLER_TARGET_ARCH}"
          fi
          # macOS x86_64 在 arm64 runner 上依赖 Rosetta
          if [ "${{ runner.os }}" = "macOS" ] && [ "${PYINSTALLER_TARGET_ARCH}" = "x86_64" ]; then
            softwareupdate --install-rosetta --agree-to-license || true
          fi
          uv run pyinstaller S2A-Manager.spec --noconfirm
          if [ ! -f "dist/${{ matrix.built_name }}" ]; then
            echo "Build output missing: dist/${{ matrix.built_name }}"
            ls -la dist || true
            exit 1
          fi
          # 统一为带平台后缀的产物名
          if [ "${{ matrix.built_name }}" != "${{ matrix.asset_name }}" ]; then
            mv "dist/${{ matrix.built_name }}" "dist/${{ matrix.asset_name }}"
          fi
          chmod +x "dist/${{ matrix.asset_name }}" || true
          if [ "${{ runner.os }}" = "macOS" ]; then
            file "dist/${{ matrix.asset_name }}" || true
            lipo -info "dist/${{ matrix.asset_name }}" 2>/dev/null || true
          fi
          ls -la dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  publish:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten assets
        shell: bash
        run: |
          mkdir -p dist
          find release-assets -type f -print
          find release-assets -type f -exec cp -v {} dist/ \;
          ls -la dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.resolve.outputs.release_tag }}"
          mapfile -t files < <(find dist -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi

          notes="$(cat <<'EOF'
          ## S2A Manager ${TAG}

          跨平台可执行包（PyInstaller 单文件）。

          ### 下载

          | 平台 | 文件 |
          |------|------|
          | Windows x64 | `S2A-Manager-windows-x64.exe` |
          | macOS Apple Silicon | `S2A-Manager-macos-arm64` |
          | macOS Intel | `S2A-Manager-macos-x64` |
          | Linux x64 | `S2A-Manager-linux-x64` |

          ### 说明

          - 首次运行前请配置网站地址与管理员 API Key
          - macOS / Linux 若无法直接打开，请先 `chmod +x` 后执行
          - macOS 可能提示未签名：系统设置 → 隐私与安全性 → 仍要打开

          EOF
          )"
          notes="${notes//\$\{TAG\}/$tag}"

          if gh release view "$tag" --json tagName -q .tagName >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" \
              --title "S2A Manager $tag" \
              --notes "$notes"
          fi
