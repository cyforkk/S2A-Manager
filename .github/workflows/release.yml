name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的现有 tag，例如 v0.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Resolve Release Tag
        id: release_ref
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "checkout_ref=${{ inputs.tag }}" >> $env:GITHUB_OUTPUT
            "release_tag=${{ inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            "checkout_ref=${{ github.ref }}" >> $env:GITHUB_OUTPUT
            "release_tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release_ref.outputs.checkout_ref }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install Build Dependencies
        shell: pwsh
        run: |
          uv sync --group dev --frozen

      - name: Normalize PyInstaller Spec For CI
        shell: pwsh
        run: |
          @'
          # -*- mode: python ; coding: utf-8 -*-
          
          import os
          from pathlib import Path
          import sys
          
          PYTHON_ROOT = Path(os.environ.get("PYINSTALLER_PYTHON_ROOT") or sys.base_prefix)
          if not (PYTHON_ROOT / "tcl").exists():
              PYTHON_ROOT = Path(sys.executable).resolve().parent
          
          tk_datas = [
              (str(PYTHON_ROOT / "tcl" / "tcl8.6"), "_tcl_data"),
              (str(PYTHON_ROOT / "tcl" / "tk8.6"), "_tk_data"),
              (str(PYTHON_ROOT / "tcl" / "tcl8"), "tcl8"),
              ("VERSION", "."),
          ]
          
          a = Analysis(
              ['tools\\s2a_manager.py'],
              pathex=[],
              binaries=[],
              datas=tk_datas,
              hiddenimports=['tkinter', 'tkinter.ttk', 'tkinter.filedialog', 'tkinter.messagebox', '_tkinter'],
              hookspath=['pyinstaller_hooks'],
              hooksconfig={},
              runtime_hooks=[],
              excludes=[],
              noarchive=False,
              optimize=0,
          )
          pyz = PYZ(a.pure)
          
          exe = EXE(
              pyz,
              a.scripts,
              a.binaries,
              a.datas,
              [],
              name='S2A-Manager',
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=True,
              upx_exclude=[],
              runtime_tmpdir=None,
              console=False,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
          )
          '@ | Set-Content -Path S2A-Manager.spec -Encoding UTF8

      - name: Verify Tag Matches VERSION
        shell: pwsh
        run: |
          $tag = "${{ steps.release_ref.outputs.release_tag }}"
          $version = (Get-Content VERSION -Raw).Trim()
          if ($tag -ne $version) {
            throw "Tag '$tag' does not match VERSION '$version'."
          }

      - name: Build EXE
        shell: pwsh
        run: |
          uv run pyinstaller S2A-Manager.spec --noconfirm

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: S2A-Manager-${{ steps.release_ref.outputs.release_tag }}
          path: dist/S2A-Manager.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.release_ref.outputs.release_tag }}"
          $asset = "dist/S2A-Manager.exe"

          gh release view $tag --json tagName -q .tagName *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --title "S2A Manager $tag" --generate-notes
          }
